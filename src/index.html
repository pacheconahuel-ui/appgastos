<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mis Gastos · Pache</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#667eea" id="theme-color-meta">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mis Gastos">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23667eea'/><text y='.9em' font-size='72' x='12'>💸</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23667eea'/><text y='.9em' font-size='72' x='12'>💸</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">💸</div>
    <div class="login-title">Mis Gastos</div>
    <div class="login-sub">Iniciá sesión para acceder a tus finanzas</div>
    <button class="btn-google" id="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.1l-6.2-5.2C29.3 35.3 26.7 36 24 36c-5.3 0-9.7-3.4-11.3-8l-6.6 5.1C9.5 39.4 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.2 5.2C36.9 39.4 44 34 44 24c0-1.3-.1-2.7-.4-3.9z"/></svg>
      Continuar con Google
    </button>
    <div class="login-divider">o con email</div>
    <div class="login-email-fields">
      <input type="email" class="f-ctrl" id="login-email" placeholder="Email">
      <input type="password" class="f-ctrl" id="login-pass" placeholder="Contraseña">
    </div>
    <div class="login-err" id="login-err"></div>
    <button class="btn-email" id="btn-email-action">Iniciar sesión</button>
    <button id="btn-magic-link">✉️ Enviar link mágico al email</button>
    <div id="magic-link-sent" style="display:none">✅ ¡Link enviado! Revisá tu email.</div>
    <div class="login-toggle" id="btn-toggle-register">¿No tenés cuenta? <span id="toggle-txt">Registrarse</span></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="hdr">
    <div>
      <div class="hdr-title"><span>💸</span> Mis Gastos</div>
      <div class="hdr-sub" id="hdr-month">—</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-user">
        <div class="hdr-badge" id="hdr-badge">—</div>
        <button class="btn-theme" id="btn-theme" title="Cambiar tema">🌙</button>
        <button class="btn-theme" id="btn-search" title="Búsqueda global">🔍</button>
        <button class="btn-logout" id="btn-logout" title="Cerrar sesión">⏏</button>
      </div>
      <div class="sync-pill connecting" id="sync-pill">
        <div class="dot"></div><span id="sync-label">Conectando…</span>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" data-tab="dashboard"><span class="tab-ico">📊</span>Resumen</button>
    <button class="tab" data-tab="lista"><span class="tab-ico">📋</span>Lista</button>
    <button class="tab usd-tab" data-tab="usd"><span class="tab-ico">💵</span>USD</button>
    <button class="tab saldos-tab" data-tab="saldos"><span class="tab-ico">🤝</span>Saldos</button>
    <button class="tab cuentas-tab" data-tab="cuentas"><span class="tab-ico">💼</span>Cuentas</button>
  </div>

  <div class="mig-banner" id="mig-banner"></div>

  <div class="sec on" id="tab-dashboard"></div>
  <div class="sec" id="tab-lista"></div>
  <div class="sec" id="tab-usd"></div>
  <div class="sec" id="tab-saldos"></div>
  <div class="sec" id="tab-cuentas"></div>
</div>

<!-- FABs -->
<div class="fabs" id="fabs"></div>

<!-- MODALS -->
<div class="m-overlay" id="m-overlay"></div>
<div class="m-overlay" id="usd-overlay"></div>
<div class="m-overlay" id="debt-overlay"></div>
<div class="m-overlay" id="settle-overlay"></div>
<div class="m-overlay" id="account-overlay"></div>
<div class="m-overlay" id="transfer-overlay"></div>
<div class="m-overlay" id="contacts-overlay"></div>
<div class="m-overlay" id="cat-manager-overlay"></div>
<div class="m-overlay" id="budget-overlay"></div>
<div class="m-overlay" id="goal-overlay"></div>
<div class="m-overlay" id="quick-add-overlay"></div>
<div class="m-overlay" id="gsearch-overlay"></div>

<!-- CONFIRM DIALOG -->
<div class="conf-overlay" id="conf-overlay">
  <div class="conf-dlg">
    <div class="conf-ico">⚠️</div>
    <div class="conf-ttl">Confirmá</div>
    <div class="conf-txt" id="conf-txt"></div>
    <div class="conf-btns">
      <button class="btn-no" id="btn-conf-no">Cancelar</button>
      <button class="btn-yes" id="btn-conf-yes">Eliminar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
